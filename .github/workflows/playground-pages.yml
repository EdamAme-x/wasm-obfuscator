name: playground-pages

on:
  push:
    branches:
      - main
    paths:
      - "playground/**"
      - "obfuscator/fixtures_impl.mbt"
      - "obfuscator/**"
      - "engine/**"
      - "parser/**"
      - "passes/**"
      - "internal/**"
      - "cmd/main/**"
      - "moon.mod.json"
      - "scripts/generate-browser-module.mjs"
      - ".github/workflows/playground-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: playground-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install MoonBit
        run: |
          set -euo pipefail
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Update MoonBit registry
        run: moon update

      - name: Install dependencies
        run: pnpm --dir playground install --frozen-lockfile

      - name: Sync playground fixtures
        run: pnpm --dir playground run sync:fixtures

      - name: Sync playground browser runtime
        run: pnpm --dir playground run sync:browser

      - name: Build playground
        env:
          GITHUB_ACTIONS: "true"
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: pnpm --dir playground run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: playground/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
